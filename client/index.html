<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Order food, book catering, and track deliveries from Ahmad Caterers." />
    <meta name="theme-color" content="#15110d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Ahmad Caterers" />
    <link id="pwa-icon" rel="icon" href="/icons/icon-192.png" />
    <link id="pwa-apple-icon" rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link id="pwa-manifest" rel="manifest" href="/manifest.json" />
    <script>
      (() => {
        const rawMode = "%VITE_APP_MODE%";
        const appMode = ["customer", "admin", "delivery"].includes(rawMode) ? rawMode : "customer";
        const config = appMode === "admin"
          ? {
              appType: "admin",
              manifest: "/admin-manifest.json",
              theme: "#111827",
              title: "Ahmad Admin",
              icon: "/icons/admin-icon-192.png"
            }
          : appMode === "delivery"
            ? {
                appType: "delivery",
                manifest: "/delivery-manifest.json",
                theme: "#0f766e",
                title: "Ahmad Delivery",
                icon: "/icons/delivery-icon-192.png"
              }
            : {
                appType: "customer",
                manifest: "/manifest.json",
                theme: "#15110d",
                title: "Ahmad Caterers",
                icon: "/icons/icon-192.png"
              };

        document.querySelector('meta[name="theme-color"]')?.setAttribute("content", config.theme);
        document.querySelector('meta[name="apple-mobile-web-app-title"]')?.setAttribute("content", config.title);
        document.querySelector("#pwa-icon")?.setAttribute("href", config.icon);
        document.querySelector("#pwa-apple-icon")?.setAttribute("href", config.icon);
        document.querySelector("#pwa-manifest")?.setAttribute("href", config.manifest);
        window.__pwaCurrentAppType = config.appType;
        window.__pwaCurrentManifestHref = config.manifest;

        window.addEventListener("beforeinstallprompt", (event) => {
          event.preventDefault();
          window.__pwaInstallPromptEvent = event;
          window.__pwaInstallPromptAppType = window.__pwaCurrentAppType;
          window.dispatchEvent(new Event("pwa-install-available"));
        });
      })();
    </script>
    <title>Ahmad Caterers</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
