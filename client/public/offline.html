<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <title>You are offline - Ahmad Caterers</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #fffaf2;
        color: #17120d;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        display: grid;
        gap: 16px;
        justify-items: center;
        border: 1px solid #eadfd1;
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 18px 45px rgba(23, 18, 13, 0.12);
        padding: 28px 22px;
        text-align: center;
      }

      img {
        width: 84px;
        height: 84px;
        border-radius: 18px;
        object-fit: cover;
      }

      h1,
      p {
        margin: 0;
      }

      p {
        color: #6b5b4b;
        line-height: 1.5;
      }

      button {
        min-height: 46px;
        border: 0;
        border-radius: 999px;
        background: #0f766e;
        color: #fff;
        cursor: pointer;
        font-weight: 900;
        padding: 0 22px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/logo-site.png" alt="Ahmad Caterers" />
      <h1>You are offline</h1>
      <p>Please check your connection and retry. Your saved cart will still be available when the app opens again.</p>
      <button type="button" onclick="window.location.reload()">Retry</button>
    </main>
  </body>
</html>
